services:
  - type: web
    name: rentbridge-backend
    runtime: node
    region: oregon
    plan: free
    root: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DB_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://rentbridge-frontend.onrender.com

  - type: web
    name: rentbridge-frontend
    runtime: node
    region: oregon
    plan: free
    root: frontend
    buildCommand: npm install && npm run build
    startCommand: npx serve -s build -p 3000
    envVars:
      - key: REACT_APP_API_URL
        value: https://rentbridge-backend.onrender.com/api

